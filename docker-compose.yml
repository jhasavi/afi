services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: advisorflow
      POSTGRES_PASSWORD: advisorflow
      POSTGRES_DB: advisorflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisorflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://advisorflow:advisorflow@db:5432/advisorflow
      AUTH_SECRET: ${AUTH_SECRET:-dev-docker-secret-minimum-32-characters-long}
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
